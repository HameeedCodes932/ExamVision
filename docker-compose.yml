services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proctor
      POSTGRES_PASSWORD: proctor
      POSTGRES_DB: proctor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proctor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    environment:
      PROCTOR_DATABASE_URL: postgresql+asyncpg://proctor:proctor@postgres:5432/proctor
      PROCTOR_REDIS_URL: redis://redis:6379/0
      PROCTOR_DEBUG: "true"
    volumes:
      - ./backend/app:/app/app
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
